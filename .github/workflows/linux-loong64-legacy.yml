# Build electerm for old world loong64 (LoongArch64) Linux (legacy)
#
# This workflow:
# 1. Builds x64 version with electron v31.7.7 to get the asar
# 2. Downloads electron loong64 v31.7.7 from loongnix.cn
# 3. Cross-compiles native modules for loong64 using loongnix GCC 8.3 toolchain
# 4. Merges x64 asar with loong64 electron and native modules
# 5. Uploads tar.gz to GitHub release draft
# 6. Builds deb package and uploads to GitHub release draft
# 7. Optionally uploads to R2

name: linux-loong64-legacy

on:
  push:
    branches: [ build, test, build-only, linux-loong64-legacy ]

jobs:
  build:
    runs-on: ubuntu-24.04
    environment: build
    if: ${{ !contains(github.event.head_commit.message, '[skip build]') && !contains(github.event.head_commit.message, '[skip ci]') && !contains(github.event.head_commit.message, '[skip linux]') && !contains(github.event.head_commit.message, '[skip loong64-legacy]') }}

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: 24.x

    - name: Install loongnix GCC 8.3 cross-compiler
      run: |
        TOOLCHAIN_URL="https://ftp.loongnix.cn/toolchain/gcc/release/loongarch/gcc8/loongson-gnu-toolchain-8.3-x86_64-loongarch64-linux-gnu-rc1.6.tar.xz"
        curl -L -o /tmp/toolchain.tar.xz "$TOOLCHAIN_URL"
        sudo mkdir -p /opt/loongnix-toolchain
        sudo tar xf /tmp/toolchain.tar.xz -C /opt/loongnix-toolchain --strip-components=1
        sudo ln -sf /opt/loongnix-toolchain/bin/loongarch64-linux-gnu-gcc /usr/local/bin/loongarch64-linux-gnu-gcc
        sudo ln -sf /opt/loongnix-toolchain/bin/loongarch64-linux-gnu-g++ /usr/local/bin/loongarch64-linux-gnu-g++
        loongarch64-linux-gnu-gcc --version

    - run: rm package-lock.json
    - run: npm config set legacy-peer-deps true
    - name: Update electron version to v31.7.7
      run: |
        node -e "
        const fs = require('fs');
        const pkg = JSON.parse(fs.readFileSync('package.json'));
        pkg.devDependencies.electron = '31.7.7';
        fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
        console.log('Electron version set to 31.7.7');
        "

    - name: Install dependencies
      run: |
        npm config set legacy-peer-deps true
        npm install -g yarn
        npm i

    - name: Build loong64-legacy
      env:
        WORKFLOW_NAME: linux-loong64-legacy
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        BUILD_NUMBER: ${{ secrets.BUILD_NUMBER }}
      run: bash build/bin/build-linux-loong64-legacy.sh

    - name: Verify output
      run: |
        ls -la dist-loong64-legacy/*.tar.gz dist-loong64-legacy/*.deb
        file dist-loong64-legacy/electerm-*/electerm
        find dist-loong64-legacy/electerm-* -name "*.node" -exec file {} \; | grep LoongArch

    - name: Upload to R2
      if: ${{ contains(github.event.head_commit.message, '[r2]') }}
      env:
        CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
      run: |
        mkdir -p ~/.aws
        cat > ~/.aws/credentials << EOF
        [default]
        aws_access_key_id = ${{ secrets.CF_R2_ACCESS_KEY_ID }}
        aws_secret_access_key = ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
        EOF
        cat > ~/.aws/config << EOF
        [default]
        region = auto
        endpoint_url = ${{ secrets.CF_R2_ENDPOINT }}
        EOF
        for file in $(find dist-loong64-legacy \( -name "*.tar.gz" -o -name "*.deb" \) -type f); do
          filename=$(basename "$file")
          aws s3 cp "$file" "s3://${CF_R2_BUCKET}/${filename}" \
            --acl public-read \
            --cache-control "max-age=31536000"
          echo "Uploaded: ${filename}"
        done
