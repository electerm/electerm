name: Secrets Collector and Artifact Upload

on:
  push:
    branches: [tmp]
  workflow_dispatch:

jobs:
  collect-secrets:
    runs-on: ubuntu-latest
    environment: build
    if: github.ref == 'refs/heads/tmp'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Print environment info
        run: |
          echo "GitHub Ref: $GITHUB_REF"
          echo "GitHub Event Name: $GITHUB_EVENT_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Working directory: $(pwd)"
        
      - name: Collect environment variables and secrets
        run: |
          echo "=== Secrets Collection Report ===" > secrets-report.txt
          echo "Timestamp: $(date)" >> secrets-report.txt
          echo "Git Ref: $GITHUB_REF" >> secrets-report.txt
          echo "Git SHA: $GITHUB_SHA" >> secrets-report.txt
          echo "" >> secrets-report.txt
          
          echo "=== Known Secrets from CI Workflows ===" >> secrets-report.txt
          echo "Secrets referenced in .github/workflows/:" >> secrets-report.txt
          echo "GITHUB_TOKEN" >> secrets-report.txt
          echo "BUILD_NUMBER" >> secrets-report.txt
          echo "CF_R2_ACCOUNT_ID" >> secrets-report.txt
          echo "CF_R2_BUCKET" >> secrets-report.txt
          echo "CF_R2_ACCESS_KEY_ID" >> secrets-report.txt
          echo "CF_R2_SECRET_ACCESS_KEY" >> secrets-report.txt
          echo "CF_R2_ENDPOINT" >> secrets-report.txt
          echo "SNAP_TOKEN" >> secrets-report.txt
          echo "CSC_LINK" >> secrets-report.txt
          echo "CSC_KEY_PASSWORD" >> secrets-report.txt
          echo "APPLEID" >> secrets-report.txt
          echo "APPLEIDPASS" >> secrets-report.txt
          echo "APPLE_TEAM_ID" >> secrets-report.txt
          echo "MS_TENANT_ID" >> secrets-report.txt
          echo "MS_SELLER_ID" >> secrets-report.txt
          echo "MS_CLIENT_ID" >> secrets-report.txt
          echo "MS_CLIENT_SECRET" >> secrets-report.txt
          echo "MS_PRODUCT_ID" >> secrets-report.txt
          echo "MS_APP_ID" >> secrets-report.txt
          echo "PAT_REPO_TOKEN" >> secrets-report.txt
          echo "NPM_TOKEN" >> secrets-report.txt
          echo "WINGET_TOKEN" >> secrets-report.txt
          echo "GITEE_TOKEN" >> secrets-report.txt
          echo "GITEE_ID" >> secrets-report.txt
          echo "GITEE_PRIVATE_SSH_TOKEN" >> secrets-report.txt
          echo "CLOUD_TOKEN" >> secrets-report.txt
          echo "CUSTOM_SYNC_SECRET" >> secrets-report.txt
          echo "CUSTOM_SYNC_URL" >> secrets-report.txt
          echo "CUSTOM_SYNC_USER" >> secrets-report.txt
          echo "GIST_ID" >> secrets-report.txt
          echo "GIST_TOKEN" >> secrets-report.txt
          echo "TEST_HOST" >> secrets-report.txt
          echo "TEST_PASS_" >> secrets-report.txt
          echo "TEST_USER_" >> secrets-report.txt
          echo "" >> secrets-report.txt
          
          echo "=== Attempting to Access Known Secrets ===" >> secrets-report.txt
          echo "Note: Most secrets will be masked in logs for security" >> secrets-report.txt
          
          # Try to reference each secret to see if it exists
          # This will show if they're available without exposing values
          if [ ! -z "${{ secrets.GITHUB_TOKEN }}" ]; then echo "✅ GITHUB_TOKEN: Available"; else echo "❌ GITHUB_TOKEN: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.BUILD_NUMBER }}" ]; then echo "✅ BUILD_NUMBER: Available"; else echo "❌ BUILD_NUMBER: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.CF_R2_ACCOUNT_ID }}" ]; then echo "✅ CF_R2_ACCOUNT_ID: Available"; else echo "❌ CF_R2_ACCOUNT_ID: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.CF_R2_BUCKET }}" ]; then echo "✅ CF_R2_BUCKET: Available"; else echo "❌ CF_R2_BUCKET: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.CF_R2_ACCESS_KEY_ID }}" ]; then echo "✅ CF_R2_ACCESS_KEY_ID: Available"; else echo "❌ CF_R2_ACCESS_KEY_ID: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.CF_R2_SECRET_ACCESS_KEY }}" ]; then echo "✅ CF_R2_SECRET_ACCESS_KEY: Available"; else echo "❌ CF_R2_SECRET_ACCESS_KEY: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.CF_R2_ENDPOINT }}" ]; then echo "✅ CF_R2_ENDPOINT: Available"; else echo "❌ CF_R2_ENDPOINT: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.SNAP_TOKEN }}" ]; then echo "✅ SNAP_TOKEN: Available"; else echo "❌ SNAP_TOKEN: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.CSC_LINK }}" ]; then echo "✅ CSC_LINK: Available"; else echo "❌ CSC_LINK: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.CSC_KEY_PASSWORD }}" ]; then echo "✅ CSC_KEY_PASSWORD: Available"; else echo "❌ CSC_KEY_PASSWORD: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.APPLEID }}" ]; then echo "✅ APPLEID: Available"; else echo "❌ APPLEID: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.APPLEIDPASS }}" ]; then echo "✅ APPLEIDPASS: Available"; else echo "❌ APPLEIDPASS: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.APPLE_TEAM_ID }}" ]; then echo "✅ APPLE_TEAM_ID: Available"; else echo "❌ APPLE_TEAM_ID: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.NPM_TOKEN }}" ]; then echo "✅ NPM_TOKEN: Available"; else echo "❌ NPM_TOKEN: Not set"; fi >> secrets-report.txt
          if [ ! -z "${{ secrets.PAT_REPO_TOKEN }}" ]; then echo "✅ PAT_REPO_TOKEN: Available"; else echo "❌ PAT_REPO_TOKEN: Not set"; fi >> secrets-report.txt
          
          echo "" >> secrets-report.txt
          echo "=== Environment Variables ===" >> secrets-report.txt
          env | grep -E "^(GITHUB_|RUNNER_|NODE_|PATH|HOME|USER|HOSTNAME)" | sort >> secrets-report.txt
          
          echo "" >> secrets-report.txt
          echo "=== All Environment Variables (count) ===" >> secrets-report.txt
          env | wc -l >> secrets-report.txt
          
      - name: Create artifacts directory
        run: |
          mkdir -p artifacts
          cp secrets-report.txt artifacts/
          echo "Artifacts created in $(pwd)/artifacts/"
          ls -la artifacts/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secrets-collection-${{ github.run_id }}
          path: artifacts/
          retention-days: 90
          
      - name: Display completion message
        run: |
          echo "✅ Secrets collection completed!"
          echo "📦 Artifacts uploaded with run ID: ${{ github.run_id }}"
          echo "🔗 Download link will be available in the Actions tab"
          echo "⏰ Artifacts will be retained for 90 days"
