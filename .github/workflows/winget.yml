name: Publish to WinGet
on:
  release:
    types: [released]
  push:
    branches: [ test-winget ]
jobs:
  publish:
    runs-on: ubuntu-24.04
    environment: build
    steps:
      - uses: vedantmgoyal9/winget-releaser@main
        with:
          identifier: electerm.electerm
          installers-regex: '.*.exe$'
          token: ${{ secrets.WINGET_TOKEN }}
